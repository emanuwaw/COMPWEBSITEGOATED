title: EX09 - Comp 110 Pace Data Analysis
email: "emanuelw2343@gmail.com"
description: #>- # this means to ignore newlines until "baseurl:"
  My group is analyzing the recorded pace data from the COMP110 class survey. We are interested in discovering if students felt as if the course was moving too slow or too quickly. We also analyzed the relation between note taking and how those students perceived the pacing of the course. We later compared pace data between students with STEM majors and Humanities to see if there were any differences in how those students perceived the pace of the course. 
baseurl: "/COMPWEBSITEGOATED" # the subpath of your site, e.g. /blog
url: "emanuwaw.github.io" # the base hostname & protocol for your site, e.g. http://example.com
github_username:  "emanuwaw"

